<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prompt Generator</title>
    <style>
        body { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-container { background: rgba(30,41,59,0.95); padding: 36px 28px; border-radius: 16px; box-shadow: 0 8px 32px rgba(30,41,59,0.2); width: 100%; max-width: 350px; text-align: center; }
        .login-logo { width: 54px; margin-bottom: 22px; }
        h2 { color: #60a5fa; font-size: 22px; margin-bottom: 18px; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 8px; border: 1px solid #334155; background: #232e3e; color: #e2e8f0; font-size: 15px; }
        input:focus { outline: none; border-color: #60a5fa; }
        .login-btn { width: 100%; background: linear-gradient(135deg, #60a5fa, #a78bfa); color: white; border: none; border-radius: 8px; padding: 12px 0; font-weight: 600; font-size: 16px; cursor: pointer; margin-bottom: 12px; }
        .login-btn:hover { background: linear-gradient(135deg, #4f8efc, #a78bfa); }
        .forgot-link { display: block; color: #a78bfa; font-size: 13px; margin-bottom: 10px; text-decoration: none; }
        .error-message { color: #ef4444; font-size: 13px; min-height: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="logo.png" alt="Logo" class="login-logo">
        <h2>Masuk ke Akun Anda</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="login-btn">Login</button>
            <a href="#" class="forgot-link">Lupa Password?</a>
            <div id="loginError" class="error-message"></div>
        </form>
    </div>
    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) {
        showError('Email dan password wajib diisi');
        return;
      }
      // Ganti dengan autentikasi backend untuk produksi
      if (email === 'demo@demo.com' && password === 'password123') {
        localStorage.setItem('user_logged_in', '1');
        window.location.href = 'index.html';
      } else {
        showError('Email atau password salah');
      }
    });
    function showError(msg) {
      document.getElementById('loginError').textContent = msg;
    }
    </script>
</body>
</html>
